# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

###PLUGINS###
plugin {
    split-monitor-workspaces {
        count = 4
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1
    }
}

################
### MONITORS ###
################
#https://wiki.hyprland.org/Configuring/Monitors/
monitor=HDMI-A-1,1920x1080@74.97,0x0,1
monitor=HDMI-A-2,1920x1080@60,1920x0,1

###################
### MY PROGRAMS ###
###################
$terminal = alacritty
$fileManager = nautilus
$browser = brave
$mainMod = SUPER
$menu = rofi -show drun
$calculator = kalk


#################
### AUTOSTART ###
#################
exec-once = waybar & swaync & hyprsunset &
exec-once = clipman & solaar --window=hide
exec-once = discord & brave
exec-once = hyprpm reload -n
exec-once = swww-daemon &
exec-once = openrgb --profile allwhite.orp # Loads the "allwhite" profile for the RGB in my PC case.
#clipboard manager
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,22
env = XCURSOR_THEME,breeze1
env = HYPRCURSOR_SIZE,22
env = HYPRCURSOR_THEME,breeze
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(F7DCDE60)
    col.inactive_border = rgba(A58A8D40)


    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, slide
    animation = workspacesIn, 1, 1.21, almostLinear, slide
    animation = workspacesOut, 1, 1.94, almostLinear, slide
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
  name = windowrule-1
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = windowrule-2
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}


# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us, il
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    scroll_method = on_button_down

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile=flat
    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, SUPER_L,exec, pkill rofi || $menu
bind = , XF86Calculator, exec, $calculator
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = $mainMod, F, fullscreen
bind = $mainMod, L, exec , ~/scripts/lock.sh
bind = , Print, exec, hyprshot -m region --clipboard-only
bind = $mainMod, R, exec, ~/scripts/wallpaper-picker.sh


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move focus with mainMod + arrows
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
#window movement
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

#---DEV-FIXES---
# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-3
  suppress_event = maximize
  match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-4
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}



###RULES###

#---WORKSPACES---
windowrule {
  name = windowrule-5
  workspace = 1
  match:class = brave-browser
}

windowrule {
  name = windowrule-6
  workspace = 3
  match:class = code
}

windowrule {
  name = windowrule-7
  workspace = 3
  match:class = ^(?i).*jetbrains-*
}

windowrule {
  name = windowrule-8
  workspace = 4
  match:class = gamescope
}

windowrule {
  name = windowrule-9
  workspace = 4
  match:class = ^(?i).*minecraft.*
}

windowrule {
  name = windowrule-10
  workspace = 5
  float = on
  match:class = steam
}


windowrule {
  name = windowrule-12
  workspace = special:magic
  match:class = discord
}


#---FLOAT---
windowrule {
  name = windowrule-13
  float = on
  match:class = nwg-look
  match:title = nwg-look
}

windowrule {
  name = windowrule-14
  float = on
  match:class = org.pulseaudio.pavucontrol
}


windowrule {
  name = windowrule-17
  float = on
  match:class = org.kde.gwenview
}

windowrule {
  name = windowrule-18
  float = on
  match:class = org.kde.kalk
}

windowrule {
  name = windowrule-19
  float = on
  match:class = solaar
}

#windowrulev2 = float, class: Spotify
windowrule {
  name = windowrule-20
  float = on
  match:class = nm-connection-editor
}

windowrule {
  name = windowrule-21
  tile = on
  match:class = steam
  match:title = Steam
}


#---SIZE---
windowrule {
  name = windowrule-11
  workspace = special:magic
  size = 800 700
  opacity = 0.9 override
  match:class = Spotify
}
windowrule {
  name = windowrule-15
  float = on
  size = 800 700
  match:class = org.keepassxc.KeePassXC
}

windowrule {
  name = windowrule-16
  float = on
  size = 1100 709
  match:class = org.prismlauncher.PrismLauncher
}

#---OPACITY---

#---FIXES---
#Fix for weird chromium blur bug with context menu
windowrule {
  name = windowrule-22
  no_blur = on
  match:class = ^()$
  match:title = ^()$
}

